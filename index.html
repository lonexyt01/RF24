<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Real Futbol 24</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">

</head>
<body>

<div class="container">

    <div class="title">

        REAL <span>FUTBOL 24</span>

    </div>

    <div class="card">

        <div class="stat">
            <span>👥 Online</span>
            <strong id="online">Loading...</strong>
        </div>

        <div class="stat">
            <span>👍 Likes</span>
            <strong id="likes">Loading...</strong>
        </div>

        <div class="stat">
            <span>⭐ Favorites</span>
            <strong id="favorites">Loading...</strong>
        </div>

        <div class="stat">
            <span>👁 Visits</span>
            <strong id="visits">Loading...</strong>
        </div>

        <div class="stat">
            <span>🔥 Event</span>
            <strong>Champions Cup</strong>
        </div>

        <div class="buttons">

            <a
            class="btn play"
            target="_blank"
            href="https://www.roblox.com/games/120638632374687/Real-Futbol-24">

            PLAY NOW

            </a>

            <a
            class="btn login"
            target="_blank"
            href="https://www.roblox.com/login">

            LOGIN WITH ROBLOX

            </a>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
